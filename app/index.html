<!DOCTYPE html>
<html lang=\"hu\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>CÉGVÉD.hu</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { display:flex; justify-content:space-between; padding:20px; background:white; }
    .hero { background: linear-gradient(135deg,#1e3a8a,#3730a3); color:white; padding:60px; text-align:center; }
    .btn { background:#2563eb; color:white; padding:12px 20px; border:none; border-radius:8px; cursor:pointer; }
    .section { padding:40px; text-align:center; }
    .card { background:white; padding:20px; margin:10px; display:inline-block; border-radius:12px; }
    footer { text-align:center; padding:20px; font-size:12px; color:gray; }
  </style>
</head>
<body>

<header>
  <h2>CÉGVÉD</h2>
  <button class=\"btn\">Konzultáció</button>
</header>

<section class=\"hero\">
  <h1>Védje meg vállalkozását</h1>
  <p>Személyre szabott biztosítási megoldások cégeknek</p>
  <button class=\"btn\">Kockázat felmérés</button>
</section>

<section class=\"section\">
  <h2>Szolgáltatások</h2>
  <div class=\"card\">Vagyonvédelem</div>
  <div class=\"card\">Felelősségbiztosítás</div>
  <div class=\"card\">Vezetői védelem</div>
</section>

<section class=\"section\">
  <h2>Kockázat teszt</h2>
  <p>Tudja meg, mennyire védett a vállalkozása</p>
  <button class=\"btn\">Teszt indítása</button>
</section>

<section class=\"section\">
  <h2>Ajánlatkérés</h2>
  <input placeholder=\"Cégnév\"><br><br>
  <input placeholder=\"Email\"><br><br>
  <button class=\"btn\">Ajánlatot kérek</button>
</section>

<footer>
  © 2026 CÉGVÉD.hu
</footer>

</body>
</html>
