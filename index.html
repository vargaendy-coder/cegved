<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f7fb;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:white;
}

.logo img { height:70px; }

.cta-btn {
  background:#f97316;
  color:white;
  padding:14px 24px;
  border-radius:12px;
  cursor:pointer;
}

/* HERO */
.hero {
  display:grid;
  grid-template-columns:1.2fr 1fr;
  height:90vh;
}

/* ÜZEM KÉP */
.hero-image {
  background-image: url("uzem.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  background-color: #e5e7eb;
  min-height: 600px;
}

/* JOBB OLDAL */
.hero-content {
  padding:80px;
  background:linear-gradient(135deg,#ffffff,#eaf2ff);
  position:relative;
}

.hero h1 {
  font-size:52px;
}

/* LOGÓ */
.hero-logo img {
  position:absolute;
  right:20px;
  bottom:20px;
  width:400px;
  opacity:0.3;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-box {
  background:white;
  max-width:500px;
  margin:80px auto;
  padding:40px;
  border-radius:20px;
  text-align:center;
}

.popup-btn {
  margin:10px;
  padding:14px 24px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.yes { background:#16a34a; color:white; }
.no { background:#dc2626; color:white; }

</style>
</head>

<body>

<header>
  <div class="logo"><img src="logo.png"></div>
  <div class="cta-btn" onclick="openPopup()">Kockázati felmérés</div>
</header>

<section class="hero">

  <div class="hero-image"></div>

  <div class="hero-content">
    <h1>Megvédjük vállalkozását a váratlan károktól</h1>

    <p>Személyre szabott biztosítás cégeknek</p>

    <div class="cta-btn" onclick="openPopup()">Indítás</div>

    <div class="hero-logo">
      <img src="logo.png">
    </div>
  </div>

</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">

    <h2 id="question"></h2>

    <button class="popup-btn yes" onclick="next(1)">Igen</button>
    <button class="popup-btn no" onclick="next(0)">Nincs</button>

    <div id="result"></div>

  </div>
</div>

<script>
let step=0;
let score=0;

const q=[
"Van felelősségbiztosítása?",
"Van telephely vagyonbiztosítása?",
"Van gépbiztosítás?",
"Van üzemszünet biztosítás?",
"Van munkáltatói felelősségbiztosítás?",
"Van csoportos életbiztosítás?",
"Van tulajdonosi életbiztosítás?"
];

function openPopup(){
 document.getElementById("popup").style.display="block";
 step=0; score=0;
 show();
}

function show(){
 document.getElementById("question").innerText=q[step];
}

function next(v){
 score+=v;
 step++;

 if(step<q.length){
   show();
 } else {
   let t="";
   if(score>=6) t="Védelme kiváló, de érdemes felülvizsgálni.";
   else if(score>=3) t="Közepes kockázat.";
   else t="Magas kockázat!";

   document.getElementById("question").innerText="Eredmény";
   document.getElementById("result").innerHTML=t;
 }
}
</script>

</body>
</html>
