<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#eef2f7;
  color:#0f172a;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 60px;
  background:white;
  box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

.logo img{height:80px;}

.cta{
  background:#f97316;
  color:white;
  padding:14px 26px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  min-height:90vh;
}

/* BAL KÉP */
.hero-image{
  background:url("uzem.jpg") center/contain no-repeat;
  background-color:#e5e7eb;
}

/* JOBB OLDAL */
.hero-content{
  padding:80px;
  position:relative;
  background:linear-gradient(135deg,#f8fbff,#dbeafe);
}

.hero h1{
  font-size:48px;
  line-height:1.2;
}

.hero p{
  margin-top:20px;
  color:#334155;
}

/* GOMB */
.hero-btn{
  margin-top:30px;
  display:inline-block;
  padding:16px 30px;
  background:#f97316;
  color:white;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  position:relative;
  z-index:5;
}

/* LOGÓ */
.hero-logo{
  position:absolute;
  right:40px;
  bottom:40px;
  z-index:1;
}

.hero-logo img{
  width:280px;
  opacity:0.25;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup{
  background:white;
  padding:40px;
  border-radius:20px;
  max-width:500px;
  width:90%;
  text-align:center;
}

.popup button{
  margin:10px;
  padding:12px 24px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.yes{background:#16a34a;color:white;}
.no{background:#dc2626;color:white;}
.close{margin-top:20px;display:block;color:#64748b;cursor:pointer;}
</style>
</head>

<body>

<header>
  <div class="logo"><img src="logo.png"></div>
  <div class="cta" onclick="openPopup()">Kockázati felmérés</div>
</header>

<section class="hero">

  <div class="hero-image"></div>

  <div class="hero-content">
    <h1>Megvédjük vállalkozását a váratlan károktól</h1>

    <p>Személyre szabott biztosítási megoldások cégeknek – egyszerűen, érthetően</p>

    <div class="hero-btn" onclick="openPopup()">Felmérés indítása</div>

    <div class="hero-logo">
      <img src="logo.png">
    </div>
  </div>

</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup">

    <h2 id="q"></h2>

    <button class="yes" onclick="next(1)">Igen</button>
    <button class="no" onclick="next(0)">Nincs</button>

    <div id="res"></div>

    <span class="close" onclick="closePopup()">Bezárás</span>

  </div>
</div>

<script>
let i=0, score=0;

const questions=[
"Van felelősségbiztosítása?",
"Van telephely vagyonbiztosítása?",
"Van gépbiztosítás?",
"Van üzemszünet biztosítás?",
"Van munkáltatói felelősségbiztosítás?",
"Van csoportos életbiztosítás?",
"Van tulajdonosi életbiztosítás?"
];

function openPopup(){
 document.getElementById("popup").style.display="flex";
 i=0; score=0;
 document.getElementById("res").innerHTML="";
 show();
}

function closePopup(){
 document.getElementById("popup").style.display="none";
}

function show(){
 document.getElementById("q").innerText=questions[i];
}

function next(v){
 score+=v;
 i++;

 if(i<questions.length){
   show();
 }else{
   let text="";
   if(score>=6){
     text="Az Önök védelme kiváló, de érdemes időnként felülvizsgálni.";
   }else if(score>=3){
     text="A vállalkozás közepes kockázatnak van kitéve.";
   }else{
     text="A vállalkozás jelentős kockázatnak van kitéve.";
   }

   document.getElementById("q").innerText="Eredmény";
   document.getElementById("res").innerHTML="<p>"+text+"</p>";
 }
}
</script>

</body>
</html>
