<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;}

/* HERO */
.hero{height:60vh;position:relative;}
.hero-bg{position:absolute;inset:0;background:url("uzem.jpg") center/cover no-repeat;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(10,40,80,0.9),rgba(10,40,80,0.3));}
.hero-content{position:relative;color:white;padding:120px 40px;}

/* SECTION */
.section{padding:80px 20px;background:#eef2f7;}
.container{max-width:1200px;margin:auto;display:flex;gap:40px;}

/* LISTA */
.checklist li{
background:white;
padding:18px;
margin-bottom:12px;
border-radius:12px;
cursor:pointer;
}

/* JOBB KÁRTYA */
.card{
background:linear-gradient(135deg,#1e3a8a,#1e40af);
color:white;
padding:40px;
border-radius:20px;
margin-top:60px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:16px;
max-width:500px;
}

/* TEST SCREEN */
#testScreen{
display:none;
padding:60px;
text-align:center;
}

.btn{
padding:10px 20px;
margin:10px;
border-radius:8px;
cursor:pointer;
}

.yes{background:#16a34a;color:white;}
.no{background:#dc2626;color:white;}

/* RESULT */
#result{
display:none;
padding:60px;
text-align:center;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>
<div class="hero-content">
<h1>Megvédjük vállalkozását</h1>
</div>
</section>

<!-- EDUKÁCIÓ -->
<section class="section" id="infoSection">

<div class="container">

<div style="flex:2">

<h2>Kattintson és nézze meg miért fontos</h2>

<ul class="checklist">
<li onclick="openInfo('f1')">Felelősségbiztosítás</li>
<li onclick="openInfo('f2')">Vagyonbiztosítás</li>
<li onclick="openInfo('f3')">Üzemszünet</li>
<li onclick="openInfo('f4')">Vezetői biztosítás</li>
<li onclick="openInfo('f5')">Kiberbiztosítás</li>
<li onclick="openInfo('f6')">Üzembiztonság</li>
</ul>

</div>

<div style="flex:1">

<div class="card">
<h3>2 perc alatt kiderül</h3>
<p>Mennyire védett a cége</p>

<div class="btn yes" onclick="startTest()">Teszt indítása →</div>

</div>

</div>

</div>

</section>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3 id="title"></h3>
<p id="text"></p>
<button onclick="closePopup()">Bezárás</button>
</div>
</div>

<!-- TESZT -->
<div id="testScreen">

<h2 id="question"></h2>

<div>
<button class="btn yes" onclick="answer(1)">Igen</button>
<button class="btn no" onclick="answer(0)">Nem</button>
</div>

</div>

<!-- RESULT -->
<div id="result">
<h2>Eredmény</h2>
<p id="resText"></p>
</div>

<script>
const info={
f1:{t:"Felelősségbiztosítás",d:"Kártérítési igények ellen véd."},
f2:{t:"Vagyonbiztosítás",d:"Tűz és károk ellen."},
f3:{t:"Üzemszünet",d:"Bevételkiesés."},
f4:{t:"Vezetői",d:"Személyes védelem."},
f5:{t:"Kiber",d:"Hackertámadás ellen."},
f6:{t:"Üzembiztonság",d:"Leállás csökkentése."}
};

function openInfo(id){
document.getElementById("title").innerText=info[id].t;
document.getElementById("text").innerText=info[id].d;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* TEST */
let q=[
"Van felelősségbiztosítása?",
"Van vagyonbiztosítása?",
"Van üzemszünet biztosítás?",
"Van vezetői biztosítás?",
"Van kiberbiztosítás?",
"Van üzembiztonsági terve?"
];

let step=0;
let score=0;

function startTest(){
document.getElementById("infoSection").style.display="none";
document.getElementById("testScreen").style.display="block";
showQ();
}

function showQ(){
document.getElementById("question").innerText=q[step];
}

function answer(v){
score+=v;
step++;

if(step<q.length){
showQ();
}else{
showResult();
}
}

function showResult(){
document.getElementById("testScreen").style.display="none";
document.getElementById("result").style.display="block";

let txt="";
if(score>=5) txt="Kiváló védelem";
else if(score>=3) txt="Közepes védelem";
else txt="Magas kockázat";

document.getElementById("resText").innerText=txt;
}
</script>

</body>
</html>
