<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f1f5f9;
  color:#1e293b;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:white;
}

.logo img { height:70px; }

.nav { display:flex; gap:30px; }

.nav a { color:#0b3a6f; text-decoration:none; }

.cta-btn {
  background:#f97316;
  color:white;
  padding:14px 24px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero {
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:90vh;
}

/* BAL KÉP */
.hero-image {
  background:url('https://images.unsplash.com/photo-1581092921461-eab62e97a780?q=80&w=2070') center/cover no-repeat;
}

/* JOBB TARTALOM */
.hero-content {
  padding:80px;
  position:relative;
  background:linear-gradient(135deg,#ffffff,#e0ecff);
}

.hero h1 { font-size:50px; }

.hero-btn {
  margin-top:25px;
  display:inline-block;
  background:#f97316;
  padding:16px 30px;
  border-radius:12px;
  color:white;
  text-decoration:none;
}

/* LOGÓ */
.hero-logo {
  position:absolute;
  right:30px;
  bottom:30px;
}

.hero-logo img {
  width:350px;
  opacity:0.25;
}

/* SECTION */
.section { padding:80px 20px; text-align:center; }

.card {
  background:white;
  padding:20px;
  margin:10px;
  display:inline-block;
  border-radius:12px;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-content {
  background:white;
  max-width:600px;
  margin:50px auto;
  padding:30px;
  border-radius:20px;
}

button { cursor:pointer; }
</style>
</head>

<body>

<header>
  <div class="logo"><img src="logo.png"></div>
  <div class="nav">
    <a href="#">Főoldal</a>
    <a href="#">Kapcsolat</a>
    <a class="cta-btn" onclick="openPopup()">Ingyenes konzultáció</a>
  </div>
</header>

<section class="hero">
  <div class="hero-image"></div>

  <div class="hero-content">
    <h1>Megvédjük vállalkozását a váratlan károktól</h1>
    <p>Személyre szabott biztosítások cégeknek</p>

    <a class="hero-btn" onclick="openPopup()">Kockázati felmérés</a>

    <div class="hero-logo">
      <img src="logo.png">
    </div>
  </div>
</section>

<section class="section">
  <h2>Kockázatok</h2>

  <div class="card">✔ Felelősségbiztosítás</div>
  <div class="card">✔ Vagyonvédelem</div>
  <div class="card">✔ Gépbiztosítás</div>
</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">

    <h2>Cégkockázat felmérés</h2>

    <p>Van felelősségbiztosítása?
    <button onclick="answer(1)">Igen</button>
    <button onclick="answer(0)">Nem</button></p>

    <p>Van telephely biztosítás?
    <button onclick="answer(1)">Igen</button>
    <button onclick="answer(0)">Nem</button></p>

    <div id="result"></div>

    <br>
    <button onclick="closePopup()">Bezárás</button>

  </div>
</div>

<script>
let score=0;
let count=0;

function openPopup(){
 document.getElementById("popup").style.display="block";
}

function closePopup(){
 document.getElementById("popup").style.display="none";
 score=0; count=0;
 document.getElementById("result").innerText="";
}

function answer(val){
 score+=val;
 count++;

 if(count==2){
  let text="";
  if(score==2) text="Jól védett";
  else text="Kockázatos";

  document.getElementById("result").innerText=text;
 }
}
</script>

</body>
</html>
