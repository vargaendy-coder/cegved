<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f7fb;
}

/* KERET (EZ OLDJA MEG A KILÓGÁST) */
.container{
  max-width:1400px;
  margin:0 auto;
  position:relative;
}

/* HEADER */
.header{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  z-index:10;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 40px;
}

/* LOGÓ NAGYOBB */
.logo img{
  height:90px;
}

/* NAV */
.nav{
  display:flex;
  gap:30px;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
}

.cta{
  background:#f97316;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  font-weight:600;
}

/* HERO */
.hero{
  height:85vh;
  position:relative;
  overflow:hidden;
}

/* KÉP */
.hero-bg{
  position:absolute;
  inset:0;
  background:url("uzem.jpg") center/cover no-repeat;
}

/* OVERLAY */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to right,
    rgba(10,40,80,0.9) 0%,
    rgba(10,40,80,0.8) 40%,
    rgba(10,40,80,0.4) 70%,
    rgba(10,40,80,0.1) 100%
  );
}

/* CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  padding:140px 40px;
  max-width:700px;
  color:white;
}

.hero h1{
  font-size:52px;
  line-height:1.2;
}

.hero p{
  margin-top:20px;
  font-size:18px;
  opacity:0.9;
}

/* CTA */
.hero-btn{
  margin-top:30px;
  display:inline-block;
  background:#f97316;
  padding:16px 30px;
  border-radius:12px;
  font-weight:600;
  color:white;
}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="container">

    <div class="header">
      <div class="header-inner">

        <div class="logo">
          <img src="logo.png">
        </div>

        <div class="nav">
          <a href="#">Főoldal</a>
          <a href="#">Szolgáltatások</a>
          <a href="#">Kockázat Teszt</a>
          <a href="#">Esettanulmányok</a>
          <a href="#" class="cta">Ingyenes konzultáció</a>
        </div>

      </div>
    </div>

    <div class="hero-content">
      <h1>
        Megvédjük vállalkozását<br>
        a váratlan károktól
      </h1>

      <p>
        Személyre szabott biztosítási megoldások cégeknek –
        egyszerűen, érthetően.
      </p>

      <div class="hero-btn">
        Kockázat Felmérés
      </div>
    </div>

  </div>

</section>

</body>
</html>
