<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÉGVÉD.hu</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:0 auto;
  position:relative;
}

/* HEADER (ERŐSEBB) */
.header{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  z-index:10;
  background:linear-gradient(to bottom, rgba(10,40,80,0.85), transparent);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 40px;
}

/* LOGÓ MÉG NAGYOBB */
.logo img{
  height:110px;
}

/* NAV */
.nav{
  display:flex;
  gap:35px;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
  font-size:16px;
}

/* CTA */
.cta{
  background:linear-gradient(135deg,#f97316,#ea580c);
  color:white;
  padding:12px 22px;
  border-radius:10px;
  font-weight:600;
  box-shadow:0 6px 20px rgba(249,115,22,0.4);
}

/* HERO */
.hero{
  height:90vh;
  position:relative;
  overflow:hidden;
}

/* BG */
.hero-bg{
  position:absolute;
  inset:0;
  background:url("uzem.jpg") center/cover no-repeat;
}

/* OVERLAY (PONTOSABB) */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to right,
    rgba(10,40,80,0.95) 0%,
    rgba(10,40,80,0.85) 40%,
    rgba(10,40,80,0.4) 70%,
    rgba(10,40,80,0.05) 100%
  );
}

/* CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  padding:180px 40px;
  max-width:720px;
  color:white;
}

/* HEADLINE */
.hero h1{
  font-size:56px;
  line-height:1.15;
  font-weight:700;
}

/* SUBTEXT */
.hero p{
  margin-top:25px;
  font-size:20px;
  opacity:0.9;
}

/* BUTTON */
.hero-btn{
  margin-top:35px;
  display:inline-block;
  background:linear-gradient(135deg,#f97316,#ea580c);
  padding:18px 34px;
  border-radius:12px;
  font-weight:700;
  color:white;
  box-shadow:0 10px 30px rgba(249,115,22,0.5);
}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="container">

    <div class="header">
      <div class="header-inner">

        <div class="logo">
          <img src="logo.png">
        </div>

        <div class="nav">
          <a href="#">Főoldal</a>
          <a href="#">Szolgáltatások</a>
          <a href="#">Kockázat Teszt</a>
          <a href="#">Esettanulmányok</a>
          <a href="#" class="cta">Ingyenes konzultáció</a>
        </div>

      </div>
    </div>

    <div class="hero-content">
      <h1>
        Megvédjük vállalkozását<br>
        a váratlan károktól
      </h1>

      <p>
        Személyre szabott biztosítási megoldások cégeknek –
        egyszerűen, érthetően.
      </p>

      <div class="hero-btn">
        Kockázat Felmérés
      </div>
    </div>

  </div>

</section>

</body>
</html>
